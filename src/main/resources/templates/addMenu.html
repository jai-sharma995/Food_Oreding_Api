<style>

*{

body{

}


/* ================= CONTAINER ================= */

.container{

}


/* CLOSE BUTTON */

.close-btn{

position:absolute;

}

.close-btn:hover{

color:#ff3c00;
transform:scale(1.2) rotate(10deg);

}

.restaurant-name{

color:#ffb347;

}

.subtitle{

margin-bottom:24px;

}

.container h2{

color:white;
margin-bottom:20px;

}

.input-box{

margin-bottom:16px;
position:relative;

}

.input-box input,
.input-box select{

width:100%;
padding:13px 15px;

border-radius:12px;
border:none;
outline:none;

font-size:14px;

background:rgba(255,255,255,0.95);
color:#333;

transition:0.3s;

}

.input-box input:focus,
.input-box select:focus{

box-shadow:
0 0 10px #ff6a00,
0 0 20px #ff0000;

}


/* SELECT ARROW */

.select-box::after{

content:"▼";
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
font-size:12px;

}

.file-box{

margin-top:10px;
margin-bottom:18px;

}

.file-box label{

color:white;

}

}

.submit-btn{

color:white;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 15px #ff6a00,
0 0 25px #ff0000;

}

.submit-btn:hover{

transform:translateY(-3px) scale(1.03);

box-shadow:
0 0 25px #ff0000,
0 0 40px #ff6a00;

}


/* NOTE */

.note{

color:#ddd;
font-size:13px;
margin-top:15px;

}


/* MOBILE */

@media(max-width:500px){

.container{

}

.container h2{

}

.restaurant-name{

}

}

</style>

</head>

<body>

<div class="container">

<div class="close-btn" onclick="goBack()">✖</div>

<p class="subtitle">

</button>

</p>

</div>

</html>
