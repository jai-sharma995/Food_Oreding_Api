<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Menu | Hungry Souls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND (CLEAR RESTAURANT STYLE) */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;

    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1400&q=80")
    no-repeat center center/cover;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 520px;
    padding: 40px 30px;
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    text-align: center;
    position: relative;
}

/* CLOSE BUTTON */
.close-btn {
    position: absolute;
    top: 15px;
    right: 18px;
    font-size: 22px;
    color: #555;
    cursor: pointer;
    transition: 0.3s;
}

.close-btn:hover {
    color: #ff4d4d;
    transform: scale(1.2);
}

/* HEADER TEXT */
.restaurant-name {
    font-size: 24px;
    font-weight: 700;
    color: #ff512f;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 13px;
    color: #777;
    margin-bottom: 25px;
}

/* TITLE */
.container h2 {
    margin-bottom: 20px;
    font-size: 26px;
    color: #222;
}

/* INPUT BOX */
.input-box {
    margin-bottom: 16px;
}

.input-box input,
.input-box select {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.3s;
}

.input-box input:focus,
.input-box select:focus {
    border-color: #ff512f;
    box-shadow: 0 0 8px rgba(255,81,47,0.3);
}

/* FILE BOX */
.file-box {
    margin-bottom: 18px;
    text-align: left;
}

.file-box label {
    font-size: 13px;
    color: #444;
    margin-bottom: 6px;
    display: block;
}

.file-box input {
    width: 100%;
    padding: 10px;
    border: 1px dashed #ccc;
    border-radius: 10px;
    background: #fafafa;
}

/* PREVIEW */
.preview-box {
    text-align: left;
    margin-bottom: 15px;
}

.preview-box label {
    font-size: 13px;
    color: #444;
}

.preview-img {
    width: 160px;
    height: 110px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 8px;
}

/* BUTTONS */
.button-group {
    display: flex;
    gap: 10px;
}

.update-btn,
.cancel-btn {
    flex: 1;
    padding: 13px;
    border-radius: 25px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

/* UPDATE BUTTON */
.update-btn {
    background: linear-gradient(135deg,#00b894,#00cec9);
    color: white;
}

.update-btn:hover {
    transform: scale(1.05);
}

/* CANCEL BUTTON */
.cancel-btn {
    background: #444;
    color: white;
    text-decoration: none;
    display: flex;
    justify-content: center;
    align-items: center;
}

.cancel-btn:hover {
    background: #222;
}

/* NOTE */
.note {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}

/* MOBILE */
@media (max-width: 500px) {
    .container {
        padding: 25px 18px;
    }

    .button-group {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="close-btn" onclick="goBack()">✖</div>

    <div class="restaurant-name">Hungry Souls Hub 🍴</div>
    <p class="subtitle">Update your dishes and keep your menu fresh & appealing.</p>

    <h2>Edit Dish Details</h2>

    <form th:action="@{/updateMenu}" th:object="${menu}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <div class="input-box">
            <input type="text" th:field="*{name}" placeholder="Food Name" required>
        </div>

        <div class="input-box">
            <select th:field="*{category}" required>
                <option value="">Select Category</option>
                <option value="Foods">Foods</option>
                <option value="Drinks">Drinks</option>
                <option value="Snacks">Snacks</option>
                <option value="Sweets">Sweets</option>
            </select>
        </div>

        <div class="input-box">
            <input type="number" th:field="*{MRP}" placeholder="Price (₹)" required>
        </div>

        <div class="preview-box">
            <label>Current Dish Image</label>
            <img th:src="@{${menu.image}}" class="preview-img">
        </div>

        <div class="file-box">
            <label for="imageFile">Upload New Image</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*">
        </div>

        <div class="button-group">
            <button type="submit" class="update-btn">Update Dish</button>
            <a href="/list" class="cancel-btn">Cancel</a>
        </div>
    </form>

    <p class="note">Keep your menu updated to attract more customers.</p>

</div>

<script>
function goBack() {
    window.location.href = "/list"; 
}

document.getElementById("imageFile").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.querySelector(".preview-img").src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
