<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Menu | Foodies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;

    /* ✅ Updated Premium Background */
    background:
    linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.75)),
    url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1400&q=80")
    no-repeat center center/cover;
}

.container {
    width: 100%;
    max-width: 520px;
    padding: 38px 32px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 25px 55px rgba(0,0,0,0.45);
    text-align: center;
}

.restaurant-name {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
}

.subtitle {
    color: #eaeaea;
    font-size: 14px;
    margin-bottom: 26px;
    opacity: 0.9;
}

.container h2 {
    color: #fff;
    margin-bottom: 22px;
    font-size: 28px;
    font-weight: 600;
}

.input-box {
    margin-bottom: 18px;
    position: relative;
}

.input-box input,
.input-box select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.95);
    color: #333;
}

.input-box select {
    appearance: none;
    cursor: pointer;
}

.select-box::after {
    content: "▼";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: #555;
}

.file-box {
    margin-top: 10px;
    margin-bottom: 20px;
    text-align: left;
}

.file-box label {
    color: #fff;
    font-size: 14px;
    margin-bottom: 8px;
    display: block;
    font-weight: 500;
}

.file-box input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 2px dashed rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.92);
    cursor: pointer;
}

.preview-box {
    margin-bottom: 20px;
    text-align: left;
}

.preview-box label {
    color: #fff;
    margin-bottom: 8px;
    display: block;
    font-size: 14px;
    font-weight: 500;
}

.preview-img {
    width: 100%;
    max-width: 190px;
    height: 130px;
    object-fit: cover;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

.button-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.update-btn,
.cancel-btn {
    flex: 1;
    padding: 14px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.update-btn {
    background: linear-gradient(135deg, #00b894, #00cec9);
    color: white;
}

.update-btn:hover {
    transform: translateY(-2px);
}

.cancel-btn {
    background: linear-gradient(135deg, #636e72, #2d3436);
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cancel-btn:hover {
    transform: translateY(-2px);
}

.note {
    color: #ddd;
    font-size: 13px;
    margin-top: 16px;
}

@media (max-width: 500px) {
    .container {
        padding: 28px 20px;
    }

    .restaurant-name {
        font-size: 20px;
    }

    .container h2 {
        font-size: 24px;
    }

    .button-group {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Updated Text -->
    <div class="restaurant-name">Foodies Hub 🍴</div>

    <p class="subtitle">Update your dishes and keep your menu fresh & appealing.</p>

    <h2>Edit Dish Details</h2>

    <form th:action="@{/updateMenu}" th:object="${menu}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <div class="input-box">
            <input type="text" th:field="*{name}" placeholder="Food Name" required>
        </div>

        <div class="input-box select-box">
            <select th:field="*{category}" required>
                <option value="">Select Category</option>
                <option value="Foods">Foods</option>
                <option value="Drinks">Drinks</option>
                <option value="Snacks">Snacks</option>
                <option value="Sweets">Sweets</option>
            </select>
        </div>

        <div class="input-box">
            <input type="number" th:field="*{MRP}" placeholder="Price (₹)" required>
        </div>

        <div class="preview-box">
            <label>Current Dish Image</label>
            <img th:src="@{${menu.image}}" alt="Food Image" class="preview-img">
        </div>

        <div class="file-box">
            <label for="imageFile">Upload New Image</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*">
        </div>

        <div class="button-group">
            <button type="submit" class="update-btn">Update Dish</button>
            <a href="/EditMenuPage" class="cancel-btn">Cancel</a>
        </div>
    </form>

    <p class="note">Keep your menu updated to attract more customers.</p>

</div>

<!-- Live Preview Script -->
<script>
document.getElementById("imageFile").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.querySelector(".preview-img").src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
