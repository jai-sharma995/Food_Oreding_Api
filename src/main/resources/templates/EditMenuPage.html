<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Menu | Foodies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background:
    linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.70)),
    url("https://images.unsplash.com/photo-1556911220-bff31c812dba?auto=format&fit=crop&w=1400&q=80")
    no-repeat center center/cover;
}

.container {
    width: 100%;
    max-width: 500px;
    padding: 35px 30px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    text-align: center;
}

.restaurant-name {
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
}

.subtitle {
    color: #f1f1f1;
    font-size: 14px;
    margin-bottom: 24px;
    opacity: 0.95;
}

.container h2 {
    color: #fff;
    margin-bottom: 20px;
    font-size: 28px;
    font-weight: 600;
}

.input-box {
    margin-bottom: 16px;
    position: relative;
}

.input-box input,
.input-box select {
    width: 100%;
    padding: 13px 15px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.95);
    color: #333;
}

.input-box select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    cursor: pointer;
}

.select-box::after {
    content: "▼";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: #555;
    pointer-events: none;
}

.file-box {
    margin-top: 10px;
    margin-bottom: 18px;
    text-align: left;
}

.file-box label {
    color: #fff;
    font-size: 14px;
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
}

.file-box input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 2px dashed rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.92);
    color: #333;
    cursor: pointer;
}

.preview-box {
    margin-bottom: 18px;
    text-align: left;
}

.preview-box label {
    color: #fff;
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 500;
}

.preview-img {
    width: 100%;
    max-width: 180px;
    height: 120px;
    object-fit: cover;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 8px 18px rgba(0,0,0,0.20);
}

.button-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.update-btn,
.cancel-btn {
    flex: 1;
    text-decoration: none;
    text-align: center;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

.update-btn {
    background: linear-gradient(135deg, #00b894, #00cec9);
    color: white;
    box-shadow: 0 10px 20px rgba(0,184,148,0.3);
}

.update-btn:hover {
    transform: translateY(-2px);
}

.cancel-btn {
    background: linear-gradient(135deg, #636e72, #2d3436);
    color: white;
    box-shadow: 0 10px 20px rgba(45,52,54,0.28);
}

.cancel-btn:hover {
    transform: translateY(-2px);
}

.note {
    color: #efefef;
    font-size: 13px;
    margin-top: 15px;
    opacity: 0.9;
}

@media (max-width: 500px) {
    .container {
        padding: 28px 20px;
    }

    .restaurant-name {
        font-size: 20px;
    }

    .container h2 {
        font-size: 24px;
    }

    .button-group {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="restaurant-name">My Restaurant 🍽️</div>
    <!-- Dynamic:
    <div class="restaurant-name" th:text="${restaurantName}"></div>
    -->

    <p class="subtitle">Update your dish details and keep your menu fresh.</p>

    <h2>Edit Menu Item</h2>

    <form th:action="@{/updateMenu}" th:object="${menu}" method="post" enctype="multipart/form-data">

        <!-- Hidden id -->
        <input type="hidden" th:field="*{id}">

        <div class="input-box">
            <input type="text" th:field="*{name}" placeholder="Food Name" required>
        </div>

        <div class="input-box select-box">
            <select th:field="*{category}" required>
                <option value="">Select Category</option>
                <option value="Foods">Foods</option>
                <option value="Drinks">Drinks</option>
                <option value="Snacks">Snacks</option>
                <option value="Sweets">Sweets</option>
            </select>
        </div>

        <div class="input-box">
            <input type="number" th:field="*{MRP}" placeholder="Price (₹)" required>
        </div>

        <div class="preview-box">
            <label>Current Food Image</label>
            <img th:src="@{${menu.image}}" alt="Current Food Image" class="preview-img">
        </div>

        <div class="file-box">
            <label for="imageFile">Change Food Image</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*">
        </div>

        <div class="button-group">
            <button type="submit" class="update-btn">Update Menu Item</button>
            <a href="/EditMenuPage" class="cancel-btn">Cancel</a>
        </div>
    </form>

    <p class="note">Keep your menu updated for a better customer experience.</p>

</div>

</body>
</html>
