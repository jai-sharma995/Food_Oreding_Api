<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Order Alert</title>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease;
    }

    h1 {
        margin-bottom: 15px;
        color: #ff4b2b;
    }

    p {
        margin-bottom: 25px;
        color: #555;
        font-size: 16px;
    }

    button {
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(45deg, #ff416c, #ff4b2b);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🍕 Food Order</h1>
    <p>Click below to confirm your order</p>
    <button onclick="showAlert()">Order Now</button>
</div>

<script>
function showAlert() {
    Swal.fire({
        title: "🍔 Your Food is Ordered!",
        text: "At your location 🚀",
        icon: "success",
        confirmButtonText: "OK"
    }).then((result) => {
        if (result.isConfirmed) {
            // 👉 yaha redirect hoga
            window.location.href = "/";
        }
    });
}
</script>

</body>
</html>
