<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Order Alert</title>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
            linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1400&q=80")
            center/cover no-repeat;
        color: white;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(15px);
        padding: 45px 35px;
        border-radius: 25px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        animation: fadeIn 1s ease;
        max-width: 350px;
        width: 90%;
    }

    h1 {
        margin-bottom: 15px;
        font-size: 32px;
        color: #ffcc70;
    }

    p {
        margin-bottom: 25px;
        color: #ddd;
        font-size: 15px;
    }

    button {
        padding: 12px 28px;
        font-size: 16px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #ffcc70, #ff8c42);
        color: black;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    button:hover {
        transform: scale(1.08);
        box-shadow: 0 12px 35px rgba(0,0,0,0.6);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🍔 Hungry Souls Order</h1>
    <p>Tap below to confirm your delicious meal 😋</p>
    <button onclick="showAlert()">Order Now</button>
</div>

<script>
function showAlert() {
    Swal.fire({
        title: "🍕 Order Placed Successfully!",
        text: "Your food is on the way 🚀",
        icon: "success",
        confirmButtonText: "Awesome!"
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/";
        }
    });
}
</script>

</body>
</html>
