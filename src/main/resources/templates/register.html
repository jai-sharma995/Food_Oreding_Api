<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Restaurant Register | Hungry Souls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
	rel="stylesheet">

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

/* 🔥 FIRE + COOKING BACKGROUND */
body {
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
		url("https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=1600&q=80")
		no-repeat center center/cover;
}

/* CONTAINER */
.register-container {
	width: 100%;
	max-width: 420px;
	padding: 35px 30px;
	background: rgba(0, 0, 0, 0.65);
	border-radius: 22px;
	border: 1px solid rgba(255, 120, 0, 0.6);
	box-shadow: 0 0 25px #ff6a00, 0 0 50px rgba(255, 80, 0, 0.5);
	text-align: center;
	position: relative;
	color: white;
	backdrop-filter: blur(10px);
}

/* CLOSE BUTTON */
.close-btn {
	position: absolute;
	top: 15px;
	right: 18px;
	font-size: 20px;
	color: white;
	cursor: pointer;
	transition: 0.3s;
}

.close-btn:hover {
	color: #ff3c00;
	transform: scale(1.2) rotate(10deg);
}

/* TITLE */
.register-container h2 {
	color: #ff8c00;
	font-size: 26px;
	margin-bottom: 8px;
	text-shadow: 0 0 10px #ff6a00, 0 0 20px red;
}

/* SUBTITLE */
.subtitle {
	color: #ddd;
	font-size: 14px;
	margin-bottom: 25px;
}

/* INPUT */
.input-box {
	margin-bottom: 16px;
}

.input-box input {
	width: 100%;
	padding: 13px 14px;
	border-radius: 12px;
	border: none;
	outline: none;
	font-size: 14px;
	background: white;
	transition: 0.3s;
}

.input-box input:focus {
	box-shadow: 0 0 10px #ff6a00, 0 0 20px red;
}

/* BUTTON */
.register-btn {
	width: 100%;
	padding: 13px;
	border: none;
	border-radius: 25px;
	font-size: 15px;
	font-weight: 600;
	background: linear-gradient(135deg, #ff6a00, #ff0000, #ff9900);
	color: white;
	cursor: pointer;
	transition: 0.3s;
	box-shadow: 0 0 15px #ff6a00, 0 0 25px red;
}

.register-btn:hover {
	transform: translateY(-3px) scale(1.03);
	box-shadow: 0 0 25px red, 0 0 40px #ff6a00;
}

/* LOGIN LINK */
.login-link {
	margin-top: 18px;
	font-size: 14px;
	color: #ccc;
}

.login-link a {
	color: #ff8c00;
	text-decoration: none;
	font-weight: 600;
}

.login-link a:hover {
	text-shadow: 0 0 10px #ff6a00;
}

/* ERROR */
.error {
	margin-top: 12px;
	color: #ffb3b3;
	font-size: 13px;
}

/* MOBILE */
@media ( max-width :500px) {
	.register-container {
		margin: 0 15px;
		padding: 25px 20px;
	}
}
</style>
</head>


<body>

	<div class="register-container">

		<div class="close-btn" onclick="goBack()">✖</div>

		<h2>Restaurant Registration</h2>

		<p class="subtitle">Create your restaurant account and start
			serving customers.</p>


		<form th:action="@{/register}" th:object="${restaurant}" method="post">

			<div class="input-box">

				<input type="text" th:field="*{restaurantName}"
					placeholder="Restaurant Name" required>

			</div>


			<div class="input-box">

				<input type="text" th:field="*{username}" placeholder="Username"
					required>

			</div>


			<div class="input-box">

				<input type="password" th:field="*{password}" placeholder="Password"
					required>

			</div>


			<button type="submit" class="register-btn">Register</button>

		</form>


		<div class="login-link">

			Already have an account? <a href="/loginn"> Login </a>

		</div>


		<p class="error" th:text="${error}"></p>

	</div>


	<script>

function goBack(){
window.history.back();
}

</script>

</body>
</html>
