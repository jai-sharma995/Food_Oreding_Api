<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Register</title>
</head>
<body>

<h2>Restaurant Registration</h2>

<form th:action="@{/register}" th:object="${restaurant}" method="post">

    <input type="text" th:field="*{restaurantName}"
           placeholder="Restaurant Name" required><br><br>

    <input type="text" th:field="*{username}"
           placeholder="Username" required><br><br>

    <input type="password" th:field="*{password}"
           placeholder="Password" required><br><br>

    <button type="submit">Register</button>
</form>

<p style="color:red" th:text="${error}"></p>

</body>
</html>
