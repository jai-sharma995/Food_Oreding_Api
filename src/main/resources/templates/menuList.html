<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hungry Souls | My Menu</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Food Background */
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
            min-height: 100vh;
        }

        /* Overlay */
        .overlay {
            background: rgba(0,0,0,0.6);
            min-height: 100vh;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #ffcc00;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
        }

        /* Table Styling */
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        th {
            background: #ff4d4d;
            color: white;
            padding: 12px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f5f5f5;
        }

        img {
            border-radius: 8px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>🍴 Hungry Souls</h1>
    <h2>My Menu Items</h2>

    <table>
        <tr>
            <th>Restaurant</th>
            <th>Name</th>
            <th>Category</th>
            <th>MRP</th>
            <th>Image</th>
        </tr>

        <tr th:each="m : ${menuList}">
            <td th:text="${m.restaurantsName}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.category}"></td>
            <td th:text="${m.MRP}"></td>
            <td>
                <img th:src="@{${m.image}}" width="70">
            </td>
        </tr>
    </table>

</div>

</body>
</html>
