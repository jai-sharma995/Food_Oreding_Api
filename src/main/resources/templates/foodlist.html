<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Foodies | Online Food Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background:
        linear-gradient(rgba(255,255,255,0.85), rgba(255,245,240,0.9)),
        url("https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=1400&q=80")
        no-repeat center center fixed;
    background-size: cover;
}

/* Header */
header {
    width: 92%;
    margin: 20px auto;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 15px 25px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #ff4d4d;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: #333;
    font-weight: 600;
}

nav a:hover {
    color: #ff4d4d;
}

/* Hero */
.hero {
    width: 92%;
    margin: 20px auto;
    padding: 40px;
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    text-align: center;
}

.hero h2 {
    font-size: 36px;
}

.hero p {
    color: #666;
    margin: 10px 0;
}

/* Food Section */
.food-section {
    width: 92%;
    margin: 30px auto;
}

.food-section h2 {
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Card */
.food-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.food-card:hover {
    transform: translateY(-5px);
}

.food-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.content {
    padding: 15px;
}

.price {
    color: #ff4d4d;
    font-weight: bold;
}

.order-btn {
    background: #00b894;
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    text-decoration: none;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
    background: #222;
    color: white;
}
</style>
</head>

<body>

<header>
    <div class="logo">Foodies</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
    </nav>
</header>

<section class="hero">
    <h2>स्वादिष्ट खाना आपके घर तक</h2>
    <p>अपने पसंदीदा रेस्टोरेंट से खाना ऑर्डर करें</p>
</section>

<section class="food-section">
    <h2>Popular Dishes</h2>
    <div class="grid" id="foodList"></div>
</section>

<footer>
    <p>© 2026 Foodies. All Rights Reserved.</p>
</footer>

<script>
// Demo Data (अगर backend नहीं है तो ये चलेगा)
const data = [
    {
        name: "Coffee",
        restaurantsName: "Saini Restaurant",
        category: "Drink",
        MRP: 99,
        image: "https://images.unsplash.com/photo-1509042239860-f550ce710b93"
    },
    {
        name: "Paav Bhaji",
        restaurantsName: "Haritawal Kitchen",
        category: "Food",
        MRP: 129,
        image: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"
    },
    {
        name: "Burger",
        restaurantsName: "Fast Food Hub",
        category: "Fast Food",
        MRP: 149,
        image: "https://images.unsplash.com/photo-1550547660-d9450f859349"
    }
];

// Render Cards
const foodList = document.getElementById("foodList");

data.forEach(item => {
    foodList.innerHTML += `
        <div class="food-card">
            <img src="${item.image}" alt="${item.name}">
            <div class="content">
                <h3>${item.name}</h3>
                <p>${item.restaurantsName}</p>
                <p>${item.category}</p>
                <p class="price">₹ ${item.MRP}</p>
                <a href="#" class="order-btn">Order Now</a>
            </div>
        </div>
    `;
});
</script>

</body>
</html>
