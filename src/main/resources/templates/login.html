<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Login | Foodies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
    linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.68)),
    url("https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1400&q=80")
    no-repeat center center/cover;
}

.login-container {
    width: 100%;
    max-width: 430px;
    padding: 42px 30px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(13px);
    -webkit-backdrop-filter: blur(13px);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 22px;
    box-shadow: 0 20px 46px rgba(0,0,0,0.35);
    text-align: center;
}

.login-container h2 {
    color: white;
    font-size: 30px;
    margin-bottom: 10px;
    font-weight: 700;
}

.subtitle {
    color: #ededed;
    font-size: 14px;
    margin-bottom: 25px;
    line-height: 1.6;
}

.input-box {
    margin-bottom: 18px;
}

.input-box input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.94);
}

.login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #fc4a1a, #f7b733);
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 10px 20px rgba(252, 74, 26, 0.28);
}

.login-btn:hover {
    transform: translateY(-2px);
}

.divider {
    margin: 20px 0;
    color: #fff;
    font-size: 14px;
}

.signup-btn {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 30px;
    background: linear-gradient(135deg, #4776E6, #8E54E9);
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s ease;
    box-shadow: 0 8px 18px rgba(71,118,230,0.22);
}

.signup-btn:hover {
    transform: translateY(-2px);
}

.error {
    margin-top: 15px;
    color: #ffd3d3;
    font-weight: 500;
}

@media (max-width: 500px) {
    .login-container {
        margin: 0 16px;
        padding: 32px 20px;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Restaurant Login</h2>
    <p class="subtitle">Sign in to manage your restaurant profile, menu updates, and daily orders.</p>

    <form action="/login" method="post">
        <div class="input-box">
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="divider">OR</div>

    <a href="/register" class="signup-btn">Register Your Restaurant</a>

    <p class="error" th:text="${error}"></p>
</div>

</body>
</html>
