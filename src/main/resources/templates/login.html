<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Login | Hungry Souls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Background */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,100,50,0.25), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,0,120,0.18), transparent 40%),
    linear-gradient(135deg, #0f2027, #203a43, #2c5364),
    url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee?auto=format&fit=crop&w=1400&q=80")
    center/cover no-repeat;
}

/* Login Card */
.login-container {
    width: 100%;
    max-width: 440px;
    padding: 50px 35px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(22px);
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow:
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 0 30px rgba(255,255,255,0.05);
    text-align: center;
    animation: fadeUp 0.8s ease;

    /* 🔥 Added */
    position: relative;
}

/* 🔥 CLOSE BUTTON */
.close-btn {
    position: absolute;
    top: 18px;
    right: 20px;
    font-size: 22px;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.close-btn:hover {
    color: #ff4d4d;
    transform: scale(1.2);
}

/* Heading */
.login-container h2 {
    font-size: 34px;
    font-weight: 800;
    background: linear-gradient(135deg, #ff7a18, #ff3c3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

/* Subtitle */
.subtitle {
    color: #e0e0e0;
    font-size: 14px;
    margin-bottom: 30px;
    line-height: 1.7;
}

/* Inputs */
.input-box {
    margin-bottom: 20px;
}

.input-box input {
    width: 100%;
    padding: 15px 16px;
    border-radius: 16px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.95);
    transition: 0.3s;
}

.input-box input:focus {
    box-shadow: 0 0 0 2px #ff7a18, 0 0 15px rgba(255,122,24,0.4);
}

/* Login Button */
.login-btn {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #ff7a18, #ff3c3c);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 15px 35px rgba(255, 90, 50, 0.4);
}

.login-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 20px 45px rgba(255, 90, 50, 0.6);
}

/* Divider */
.divider {
    margin: 24px 0;
    color: #ddd;
    font-size: 14px;
    position: relative;
}

.divider::before,
.divider::after {
    content: "";
    height: 1px;
    width: 32%;
    background: rgba(255,255,255,0.25);
    position: absolute;
    top: 50%;
}

.divider::before { left: 0; }
.divider::after { right: 0; }

/* Signup Button */
.signup-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    background: linear-gradient(135deg, #4facfe, #6a5cff);
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 12px 30px rgba(79,172,254,0.4);
}

.signup-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 18px 40px rgba(79,172,254,0.6);
}

/* Error */
.error {
    margin-top: 15px;
    color: #ffb3b3;
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Mobile */
@media (max-width: 500px) {
    .login-container {
        padding: 35px 20px;
    }
}
</style>
</head>

<body>

<div class="login-container">

    <!-- 🔥 CLOSE BUTTON -->
    <div class="close-btn" onclick="goBack()">✖</div>

    <h2>Restaurant Login</h2>

    <p class="subtitle">
        Access your restaurant dashboard, manage menus, track orders, and grow your business effortlessly — all in one place.
    </p>

    <form action="/login" method="post">
        <div class="input-box">
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="divider">OR</div>

    <a href="/register" class="signup-btn">Register Your Restaurant</a>

    <p class="error" th:text="${error}"></p>
</div>

<script>
// 🔥 CLOSE BUTTON FUNCTION
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
