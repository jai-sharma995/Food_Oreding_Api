<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Login | Hungry Souls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


/* 🔥 FIRE + COOKING BACKGROUND */

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)),
url("https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=1600&q=80")
no-repeat center center/cover;

}


/* LOGIN BOX */

.login-container{

width:100%;
max-width:420px;

padding:45px 30px;

background:rgba(0,0,0,0.65);

border-radius:22px;

border:1px solid rgba(255,120,0,0.6);

box-shadow:
0 0 25px #ff6a00,
0 0 50px rgba(255,80,0,0.5);

text-align:center;

color:white;

position:relative;

backdrop-filter:blur(10px);

}


/* CLOSE BUTTON */

.close-btn{

position:absolute;
top:15px;
right:20px;

font-size:22px;

color:#fff;

cursor:pointer;

transition:0.3s;

}

.close-btn:hover{

color:#ff3c00;

transform:scale(1.2) rotate(10deg);

}


/* TITLE */

.login-container h2{

font-size:30px;

margin-bottom:10px;

color:#ff8c00;

text-shadow:
0 0 10px #ff6a00,
0 0 20px red;

}


/* SUBTITLE */

.subtitle{

font-size:14px;

color:#ddd;

margin-bottom:25px;

}


/* INPUT */

.input-box{

margin-bottom:18px;

}

.input-box input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

outline:none;

font-size:14px;

background:white;

transition:0.3s;

}

.input-box input:focus{

box-shadow:
0 0 10px #ff6a00,
0 0 20px red;

}


/* LOGIN BUTTON */

.login-btn{

width:100%;

padding:14px;

border:none;

border-radius:30px;

background:
linear-gradient(135deg,#ff6a00,#ff0000,#ff9900);

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 15px #ff6a00,
0 0 25px red;

}

.login-btn:hover{

transform:translateY(-3px) scale(1.03);

box-shadow:
0 0 25px red,
0 0 40px #ff6a00;

}


/* DIVIDER */

.divider{

margin:20px 0;

color:#ccc;

}


/* REGISTER BUTTON */

.signup-btn{

display:block;

padding:12px;

border-radius:30px;

background:
linear-gradient(135deg,#00c6ff,#0072ff);

color:white;

text-decoration:none;

font-weight:600;

transition:0.3s;

}

.signup-btn:hover{

transform:translateY(-3px);

box-shadow:
0 0 15px #00c6ff;

}


/* ERROR */

.error{

margin-top:12px;

color:#ffb3b3;

}


/* MOBILE */

@media(max-width:500px){

.login-container{

margin:0 15px;

}

}

</style>
</head>


<body>

<div class="login-container">

<div class="close-btn" onclick="goBack()">✖</div>

<h2>Restaurant Login</h2>

<p class="subtitle">
Manage your restaurant, track orders, and grow your business.
</p>

<form action="/login" method="post">

<div class="input-box">
<input type="text"
name="username"
placeholder="Enter Username"
required>
</div>

<div class="input-box">
<input type="password"
name="password"
placeholder="Enter Password"
required>
</div>

<button type="submit"
class="login-btn">

Login

</button>

</form>

<div class="divider">OR</div>

<a href="/register"
class="signup-btn">

Register Your Restaurant

</a>

<p class="error"
th:text="${error}"></p>

</div>


<script>

function goBack(){
window.history.back();
}

</script>

</body>
</html>
