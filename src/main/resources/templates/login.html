    <meta charset="UTF-8">

            margin: 0;

        body {
            height: 100vh;

            align-items: center;

        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        /* Login container */
        .login-box {
            position: relative;
            z-index: 1;
            width: 320px;
            padding: 40px;
            background: rgba(255,255,255,0.1);

            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* Heading */
        .login-box h2 {
            color: #fff;
            margin-bottom: 20px;
        }

        /* Inputs */
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        /* Focus effect */
        .login-box input:focus {
            border: 2px solid #ff9800;
        }

        /* Button */
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #ff9800;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #e68900;
            transform: scale(1.05);
        }

        /* Error text */
        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
