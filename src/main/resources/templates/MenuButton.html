<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hungry Soul</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* DARK BACKGROUND */
body {
  background: #0f0f0f;
  color: #fff;
}

/* HEADER */
.header {
  width: 95%;
  margin: 20px auto;
  padding: 18px 25px;
  background: #1a1a1a;
  border-radius: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.brand {
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-logo {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: linear-gradient(135deg,#ff512f,#ff00cc);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.brand h1 {
  font-size: 26px;
  color: #ff4d4d;
}

/* NAV */
nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: #ff4d4d;
}

/* HERO */
.hero {
  width:95%;
  margin:25px auto;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.hero img {
  width:100%;
  height:400px;
  object-fit:cover;
  filter: brightness(60%);
}

.hero-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero-content h2 {
  font-size:42px;
  color:#fff;
}

.hero-content p {
  color:#ddd;
}

/* SECTION */
.section-heading {
  text-align:center;
  margin-top:30px;
}

.section-heading h3 {
  font-size:30px;
  color:#ff4d4d;
}

/* GRID */
#foodList {
  width:95%;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.food-card {
  background:#1a1a1a;
  border-radius:18px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
}

.food-card:hover {
  transform:translateY(-8px);
}

/* IMAGE */
.food-card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTENT */
.content {
  padding:18px;
}

.content h3 {
  font-size:20px;
}

.restaurant {
  color:#ff4d4d;
  margin:5px 0;
}

.category {
  display:inline-block;
  background:#333;
  padding:5px 10px;
  border-radius:15px;
  font-size:12px;
}

/* PRICE + BUTTON */
.price-order {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.price-btn {
  background:#ff4d4d;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  border:none;
}

.order-btn {
  background:#00c853;
  padding:8px 14px;
  border-radius:20px;
  text-decoration:none;
  color:white;
  font-size:13px;
}

/* FOOTER */
footer {
  width:95%;
  margin:30px auto;
  background:#1a1a1a;
  text-align:center;
  padding:20px;
  border-radius:15px;
  color:#ccc;
}

footer span {
  color:#ff4d4d;
}

/* STATUS */
.status-message {
  text-align:center;
  padding:40px;
  color:#aaa;
}

</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <div class="brand-logo">F</div>
    <h1>Hungry Souls</h1>
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/MenuButton">Menu</a>
    <a href="/AboutPage">About</a>
    <a href="/ContactPage">Contact</a>
  </nav>
</div>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
  <div class="hero-content">
    <h2>Experience Food Like Never Before</h2>
    <p>Order from the best restaurants near you with fast delivery.</p>
  </div>
</section>

<div class="section-heading">
  <h3>Popular Dishes</h3>
  <p>Explore trending meals loved by food lovers</p>
</div>

<div id="foodList">
  <p class="status-message">Loading delicious food items...</p>
</div>

<script>
fetch('/all')
.then(res => res.json())
.then(data => {

    const foodList = document.getElementById("foodList");
    foodList.innerHTML = "";

    data.forEach(item => {
        foodList.innerHTML += `
        <div class="food-card">
            <img src="${item.image}">
            <div class="content">
                <h3>${item.name}</h3>
                <p class="restaurant">${item.restaurantsName}</p>
                <p class="category">${item.category}</p>

                <div class="price-order">
                    <button class="price-btn">₹ ${item.MRP}</button>
                    <a href="/userDetails" class="order-btn">Order</a>
                </div>
            </div>
        </div>`;
    });
});
</script>

<footer>
  <p>© 2026 <span>Hungry Souls</span></p>
</footer>

</body>
</html>
