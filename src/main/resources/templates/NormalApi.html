<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hungry Souls | Online Food Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Chef Cooking Background */
body {
    background: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d') no-repeat center center/cover;
    background-attachment: fixed;
    color: #333;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
}

/* Navbar */
header {
    background: rgba(0,0,0,0.8);
    padding: 15px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: #ffcc00;
    font-size: 28px;
}

nav a {
    color: #fff;
    margin-left: 25px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: #ffcc00;
}

/* Section */
.food-section {
    padding: 60px;
}

.food-section h2 {
    text-align: center;
    margin-bottom: 40px;
    font-size: 34px;
    color: #fff;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* Card */
.food-card {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.food-card:hover {
    transform: translateY(-8px) scale(1.02);
}

.food-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* Content */
.food-card .content {
    padding: 18px;
}

.food-card h3 {
    font-size: 20px;
    font-weight: 600;
}

.food-card p {
    font-size: 14px;
    color: #666;
}

/* Footer of card */
.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

.price {
    font-size: 18px;
    font-weight: bold;
    color: #ff4d4d;
}

.order-btn {
    padding: 8px 18px;
    background: linear-gradient(to right, #ff4d4d, #ff9966);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.order-btn:hover {
    transform: scale(1.05);
}

/* Footer */
footer {
    background: rgba(0,0,0,0.85);
    color: #ccc;
    padding: 25px;
    text-align: center;
    margin-top: 50px;
}

footer span {
    color: #ffcc00;
}
</style>
</head>

<body>

<div class="overlay">

<header>
    <h1>Hungry Souls</h1>
    <nav>
        <a href="#">Home</a>
        <a href="http://localhost:8080/Buttonmenu">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="food-section">
    <h2>Popular Dishes</h2>
    <div class="grid" id="foodList"></div>
</section>

<script>
fetch('http://localhost:8080/all')
.then(res => res.json())
.then(data => {

    const foodList = document.getElementById("foodList");
    foodList.innerHTML = "";

    data.forEach(item => {
        foodList.innerHTML += `
        <div class="food-card">
            <img src="http://localhost:8080${item.image}" alt="${item.name}">
            <div class="content">
                <h3>${item.name}</h3>
                <p>${item.restaurantsName}</p>
                <p>${item.category}</p>

                <div class="card-footer">
                    <span class="price">₹ ${item.MRP}</span>
                    <a href="http://localhost:8080/userDetails" class="order-btn">
                        Order Now
                    </a>
                </div>
            </div>
        </div>`;
    });
})
.catch(err => console.error(err));
</script>

<footer>
    <p>© 2026 <span>Hungry Souls</span>. All Rights Reserved.</p>
</footer>

</div>

</body>
</html>
