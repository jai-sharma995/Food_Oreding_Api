<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>User Register | Foodies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* 🔥 FOOD APP BACKGROUND */
    background: linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.70)),
    url("https://images.unsplash.com/photo-1521305916504-4a1121188589?auto=format&fit=crop&w=1400&q=80")
    no-repeat center center/cover;
}

/* Container */
.container {
    width: 100%;
    max-width: 430px;
    padding: 40px 30px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    text-align: center;
}

/* Title */
.container h2 {
    color: #fff;
    font-size: 30px;
    margin-bottom: 10px;
}

.subtitle {
    color: #eee;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Inputs */
.input-box {
    margin-bottom: 18px;
}

.input-box input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.95);
}

/* Button */
.signup-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #ff512f, #ff7b54);
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 10px 20px rgba(255,81,47,0.3);
}

.signup-btn:hover {
    transform: translateY(-2px);
}

/* Login Link */
.login-link {
    margin-top: 20px;
    font-size: 14px;
    color: #eee;
}

.login-link a {
    color: #00cec9;
    text-decoration: none;
    font-weight: 600;
}

.login-link a:hover {
    text-decoration: underline;
}

/* Responsive */
@media(max-width:500px){
    .container {
        margin: 0 15px;
        padding: 30px 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h2>User Registration</h2>
    <p class="subtitle">Create your account and start ordering delicious food.</p>

<form th:action="@{/userDetails}" th:object="${details}" method="post">

    <div class="input-box">
        <input type="text" th:field="*{Username}"
               placeholder="Full Name" required>
    </div>

    <div class="input-box">
        <input type="text" th:field="*{Mobileno}"
               placeholder="Mobile Number" required>
    </div>

    <div class="input-box">
        <input type="text" th:field="*{Address}"
               placeholder="Delivery Address" required>
    </div>

    <!-- 🔐 PASSWORD FIELD -->
    <div class="input-box">
        <input type="password" th:field="*{Password}"
               placeholder="Create Password" required>
    </div>

    <!-- 🔐 CONFIRM PASSWORD (optional but recommended) -->
    <div class="input-box">
        <input type="password" name="confirmPassword"
               placeholder="Confirm Password" required>
    </div>

    <button type="submit" class="signup-btn">Sign Up</button>
</form>

    <div class="login-link">
        Already have an account?
        <a href="/userDetailsLogin">Login</a>
    </div>

</div>

</body>
</html>
