<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Details Register</title>
</head>
<body>

<h2>User Registration</h2>

<form th:action="@{/userDetails}" th:object="${details}" method="post">

    <input type="text" th:field="*{Username}"
           placeholder="Name" required><br><br>

    <input type="text" th:field="*{Mobileno}"
           placeholder="Mobileno" required><br><br>

     <input type="text" th:field="*{Address}"
           placeholder="Address" required><br><br>

    <button type="submit">Register</button>
</form>
