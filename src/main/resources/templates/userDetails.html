<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>User Register | Hungry Souls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Background */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1550547660-d9450f859349")
    no-repeat center center/cover;
}

/* Container */
.container {
    width: 100%;
    max-width: 420px;
    padding: 35px 30px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    text-align: center;
    position: relative;
}

/* Close Button */
.close-btn {
    position: absolute;
    top: 15px;
    right: 18px;
    font-size: 20px;
    color: #888;
    cursor: pointer;
    transition: 0.3s;
}

.close-btn:hover {
    color: #ff4d4d;
    transform: scale(1.2);
}

/* Title */
.container h2 {
    color: #ff4d4d;
    font-size: 26px;
    margin-bottom: 8px;
}

.subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Inputs */
.input-box {
    margin-bottom: 16px;
}

.input-box input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

.input-box input:focus {
    border-color: #ff4d4d;
    box-shadow: 0 0 6px rgba(255,77,77,0.4);
}

/* Button */
.signup-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    background: linear-gradient(to right, #ff4d4d, #ff9966);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.signup-btn:hover {
    transform: translateY(-2px);
}

/* Login Link */
.login-link {
    margin-top: 18px;
    font-size: 14px;
    color: #555;
}

.login-link a {
    color: #ff4d4d;
    text-decoration: none;
    font-weight: 600;
}

.login-link a:hover {
    text-decoration: underline;
}

/* Responsive */
@media(max-width:500px){
    .container {
        margin: 0 15px;
        padding: 25px 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Close Button -->
    <div class="close-btn" onclick="goBack()">✖</div>

    <h2>User Registration</h2>
    <p class="subtitle">Create your account and start ordering delicious food.</p>

<form th:action="@{/userDetails}" th:object="${details}" method="post">

    <div class="input-box">
        <input type="text" th:field="*{Username}"
               placeholder="Full Name" required>
    </div>

    <div class="input-box">
        <input type="text" th:field="*{Mobileno}"
               placeholder="Mobile Number" required>
    </div>

    <div class="input-box">
        <input type="text" th:field="*{Address}"
               placeholder="Delivery Address" required>
    </div>

    <div class="input-box">
        <input type="password" th:field="*{Password}"
               placeholder="Create Password" required>
    </div>

    <div class="input-box">
        <input type="password" name="confirmPassword"
               placeholder="Confirm Password" required>
    </div>

    <button type="submit" class="signup-btn">Sign Up</button>
</form>

    <div class="login-link">
        Already have an account?
        <a href="/userDetailsLogin">Login</a>
    </div>

</div>

<script>
function goBack() {
    window.history.back(); 
}
</script>

</body>
</html>
